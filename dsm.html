<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#C9A67B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TTN Administrasi">
<link rel="icon" type="image/png" sizes="32x32" href="icon_32.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon_512.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon_512.png">
<link rel="manifest" href="/manifest.json">
<title>DAM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="root.css">
<link rel="stylesheet" href="dsm.css">
<link rel="stylesheet" href="navbar.css">
</head>
<body>

<!-- SKELETON -->
<div id="skeletonLoader">
  <div class="sk-header">
    <div class="sk-header-date skeleton"></div>
    <div class="sk-header-circle skeleton"></div>
    <div class="sk-header-circle skeleton"></div>
  </div>
  <div class="sk-body">
    <div class="sk-title skeleton"></div>
    <div class="sk-toolbar skeleton"></div>
    <div class="sk-table skeleton"></div>
  </div>
</div>

<!-- MAIN -->
<div id="damPage" style="display:none">

  <!-- HEADER -->
  <header class="header">
    <div class="header-datetime">
      <span id="headerDate">—</span>
      <span id="headerTime">—</span>
    </div>
    <div class="header-actions">
      <!-- Notif -->
      <button class="icon-btn" id="notifBtn" title="Notifikasi">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-dot" id="notifDot" style="display:none"></span>
      </button>
      <!-- Avatar -->
      <div class="header-avatar" id="headerAvatarWrap">
        <img id="fotoAdmin" style="display:none" alt="foto">
        <span id="avatarInitialHeader">A</span>
      </div>
    </div>
  </header>

  <!-- PAGE BODY -->
  <main class="dam-main">

    <!-- PAGE HEADER -->
    <div class="page-header">
      <div>
        <div class="page-title">DAM</div>
        <div class="page-sub" id="cabangAdmin">—</div>
      </div>
      <button class="btn btn-primary" id="btnTambah">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Tambah
      </button>
    </div>

    <!-- TOOLBAR -->
    <div class="dam-toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Cari...">
      </div>
      <div class="toolbar-right">
        <select id="filterStatus" class="filter-select">
          <option value="">Semua Status</option>
          <option value="aktif">Aktif</option>
          <option value="nonaktif">Nonaktif</option>
        </select>
        <button class="btn" id="btnExport">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
        <button class="btn" id="btnReload">
          <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
          Reload
        </button>
      </div>
    </div>

    <!-- TABLE CARD -->
    <div class="table-card">
      <div class="table-wrap">
        <table id="damTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Nama</th>
              <th>Kode</th>
              <th>Kategori</th>
              <th>Jumlah</th>
              <th>Status</th>
              <th>Dibuat</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="damTableBody">
            <tr>
              <td colspan="8" class="table-empty">
                <div class="empty-state">
                  <svg viewBox="0 0 24 24"><path d="M9 17H5a2 2 0 0 0-2 2"/><path d="M14 7h5a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-5"/><rect x="3" y="3" width="11" height="11" rx="2"/></svg>
                  <span>Belum ada data</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- PAGINATION -->
      <div class="pagination" id="pagination">
        <button class="page-btn" id="btnPrev" disabled>
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="page-info" id="pageInfo">0 data</div>
        <button class="page-btn" id="btnNext" disabled>
          <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>

  </main>

</div>

<!-- POPUP FORM -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup-box" id="popupBox">

    <div class="popup-drag-handle" id="popupHandle"></div>

    <div class="popup-header">
      <div class="popup-title" id="popupTitle">Tambah Data</div>
      <button class="popup-close" id="popupClose">
        <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="popup-body" id="popupBody">

      <div class="form-field">
        <label>Nama</label>
        <input type="text" id="fieldNama" placeholder="Nama DAM">
      </div>

      <div class="form-field">
        <label>Kode</label>
        <input type="text" id="fieldKode" placeholder="Kode unik">
      </div>

      <div class="form-field">
        <label>Kategori</label>
        <select id="fieldKategori">
          <option value="">Pilih kategori</option>
          <option value="A">Kategori A</option>
          <option value="B">Kategori B</option>
          <option value="C">Kategori C</option>
        </select>
      </div>

      <div class="form-field">
        <label>Jumlah</label>
        <input type="number" id="fieldJumlah" placeholder="0" min="0">
      </div>

      <div class="form-field">
        <label>Status</label>
        <select id="fieldStatus">
          <option value="aktif">Aktif</option>
          <option value="nonaktif">Nonaktif</option>
        </select>
      </div>

      <div class="form-field">
        <label>Catatan</label>
        <textarea id="fieldCatatan" placeholder="Opsional..." rows="3"></textarea>
      </div>

      <button class="btn btn-primary btn-full" id="btnSimpan">Simpan</button>

    </div>
  </div>
</div>

<!-- POPUP KONFIRMASI HAPUS -->
<div class="popup-overlay" id="confirmOverlay">
  <div class="popup-box popup-box-sm" id="confirmBox">
    <div class="popup-drag-handle"></div>
    <div class="popup-header">
      <div class="popup-title">Hapus Data</div>
      <button class="popup-close" id="confirmClose">
        <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="popup-body">
      <p class="confirm-text">Yakin ingin menghapus data ini? Tindakan tidak dapat dibatalkan.</p>
      <div class="confirm-actions">
        <button class="btn" id="btnBatal">Batal</button>
        <button class="btn btn-danger" id="btnHapusKonfirm">Hapus</button>
      </div>
    </div>
  </div>
</div>

<nav></nav>
<script src="navbar.js"></script>
<script type="module" src="dsm.js"></script>

</body>
</html>
