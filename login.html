<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- PWA Meta -->
<meta name="theme-color" content="#C9A67B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TTN Administrasi">

<!-- Icons -->
<link rel="icon" type="image/png" sizes="32x32" href="icon_32.png">
<link rel="icon" type="image/png" sizes="48x48" href="icon_48.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon_512.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon_512.png">

<!-- Manifest -->
<link rel="manifest" href="/manifest.json">
<title>Login Marketing | Teh Tarik Nusantara</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="login.css">

</head>
<body>
<div class="login-box">
  <div class="logo-wrapper fade-item">
    <img src="LogoTTN.png" alt="Logo TTN" id="logoTTN">
  </div>
  <div class="input-group fade-item email-field">
    <i class="fa-solid fa-user"></i>
    <input type="email" id="username" placeholder="Email">
  </div>
  <div class="input-group fade-item password-field">
    <i class="fa-solid fa-lock"></i>
    <input type="password" id="password" placeholder="Password">
  </div>
  <button id="loginBtn" class="fade-item login-button" onclick="login()">
    <span id="btnText">Masuk</span>
    <i id="btnLoader" class="fa fa-spinner fa-spin" style="display:none"></i>
  </button>
  <p class="error" id="error-msg"></p>
  <div class="footer fade-item">© 2026 Teh Tarik Nusantara</div>
</div>
<script type="module" src="login.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker
        .register("/service-worker.js")
        .catch(err => console.log("SW gagal:", err));
    });
  }
</script>
</body>
</html>
